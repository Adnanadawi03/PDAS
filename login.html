<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDAS – Sign In</title>
<link rel="stylesheet" href="css/shared.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body>


<div class="mobile-menu" id="mobileMenu-login">
  <div class="mobile-menu-header">
    <div class="mobile-menu-logo">PDAS</div>
    <button class="mobile-close" onclick="closeMobileMenu('login')">✕</button>
  </div>
  <nav class="mobile-nav-links">
    <a href="index.html" onclick="closeMobileMenu('login')">Home</a>
    <a href="about.html" onclick="closeMobileMenu('login')">About</a>
    
  </nav>
  <div class="mobile-menu-footer"></div>
</div>
<header>
<nav>
  <a class="nav-logo" href="index.html">PDAS <span class="nav-subtitle">Phishing Detection &amp; Awareness System</span></a>
  <div style="display:flex;align-items:center;gap:0.75rem;">
    <button class="hamburger" onclick="openMobileMenu('login')" title="Menu">☰</button><button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
  </div>
</nav>
</header>

<div class="page-wrap">
  <div class="grid-bg"></div>
  <div class="bg-glow"></div>
  <div style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:440px;gap:1rem;">
  <div id="authBanner" style="display:none;background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.25);color:#00e5ff;padding:0.8rem 1rem;border-radius:10px;font-size:0.88rem;text-align:center;width:100%;"></div>
  <div class="auth-box" style="width:100%;">
    <div class="auth-logo">PDAS</div>
    <div class="auth-tagline">Phishing Detection &amp; Awareness System</div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="login-form active" id="loginForm">
      <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <input type="email" placeholder="you@example.com" id="loginEmail">
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" placeholder="••••••••" id="loginPw">
      </div>
      <div class="forgot"><a href="#" onclick="forgotPassword()">Forgot password?</a></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.85rem;color:var(--muted);">
          <input type="checkbox" id="rememberMe" style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;">
          Remember me
        </label>
      </div>
      <div id="loginError" style="color:#ef4444;font-size:0.82rem;margin-bottom:0.8rem;display:none;"></div>
      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">Sign In →</button>
    </div>

    <!-- SIGNUP FORM -->
    <div class="signup-form" id="signupForm">
      <div class="form-group">
        <label>FULL NAME</label>
        <input type="text" placeholder="Your full name" id="signupName">
      </div>
      <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <input type="email" placeholder="you@example.com" id="signupEmail">
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" placeholder="••••••••" id="signupPw" oninput="checkStrength(this.value)">
        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="pw-hint" id="pwHint">Use 8+ characters with letters, numbers &amp; symbols</div>
      </div>
      <div class="form-group">
        <label>CONFIRM PASSWORD</label>
        <input type="password" placeholder="••••••••" id="signupConfirm">
      </div>
      <div id="signupError" style="color:#ef4444;font-size:0.82rem;margin-bottom:0.8rem;display:none;"></div>
      <div id="signupSuccess" style="color:#22c55e;font-size:0.82rem;margin-bottom:0.8rem;display:none;"></div>
      <button class="submit-btn" id="signupBtn" onclick="handleSignup()">Create Account →</button>
    </div>
  </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/theme.js"></script>
<script src="js/login.js"></script>
<script>
function openMobileMenu(id) {
  document.getElementById('mobileMenu-' + id).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeMobileMenu(id) {
  document.getElementById('mobileMenu-' + id).classList.remove('open');
  document.body.style.overflow = '';
}
</script>
</body>
</html>
