<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDAS – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10; --bg2: #0f1218; --card: #161b24;
    --accent: #00e5ff; --accent2: #ff4d6d; --accent3: #a259ff;
    --text: #e8eaf0; --muted: #7a8499; --border: rgba(255,255,255,0.07);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; }
  h1,h2,h3 { font-family:'Syne',sans-serif; }

  nav {
    display:flex; align-items:center; justify-content:space-between;
    padding:1.2rem 6%; border-bottom:1px solid var(--border);
  }
  .nav-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.4rem; color:var(--accent); text-decoration:none; }
  .nav-logo span { color:var(--text); }

  .page-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:3rem 1rem; position:relative; overflow:hidden; }
  .bg-glow {
    position:absolute; width:700px; height:700px; border-radius:50%;
    background:radial-gradient(circle, rgba(0,229,255,0.05) 0%, transparent 70%);
    top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none;
  }
  .grid-bg {
    position:absolute; inset:0; opacity:0.025;
    background-image:linear-gradient(var(--accent) 1px,transparent 1px),linear-gradient(90deg,var(--accent) 1px,transparent 1px);
    background-size:60px 60px;
  }

  .auth-box {
    position:relative; width:100%; max-width:440px;
    background:var(--card); border:1px solid var(--border); border-radius:20px; padding:2.5rem;
  }
  .auth-logo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.8rem; color:var(--accent); text-align:center; margin-bottom:0.3rem; }
  .auth-tagline { text-align:center; color:var(--muted); font-size:0.88rem; margin-bottom:2rem; }

  .tabs { display:flex; background:var(--bg2); border-radius:10px; padding:4px; margin-bottom:2rem; }
  .tab-btn {
    flex:1; padding:0.6rem; border:none; background:transparent; color:var(--muted);
    border-radius:8px; cursor:pointer; font-family:'Syne',sans-serif; font-weight:600;
    font-size:0.9rem; transition:all 0.2s;
  }
  .tab-btn.active { background:var(--accent); color:#000; }

  .form-group { margin-bottom:1.2rem; }
  label { display:block; font-size:0.82rem; font-weight:500; color:var(--muted); margin-bottom:0.4rem; letter-spacing:0.04em; }
  input[type=text], input[type=email], input[type=password] {
    width:100%; background:var(--bg2); border:1px solid var(--border); border-radius:10px;
    padding:0.8rem 1rem; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.95rem;
    outline:none; transition:border-color 0.2s;
  }
  input:focus { border-color:rgba(0,229,255,0.4); }
  input::placeholder { color:var(--muted); opacity:0.6; }

  .forgot { text-align:right; margin-top:-0.8rem; margin-bottom:1.2rem; }
  .forgot a { color:var(--accent); font-size:0.8rem; text-decoration:none; }

  .submit-btn {
    width:100%; background:var(--accent); color:#000; border:none; padding:0.9rem;
    border-radius:10px; font-family:'Syne',sans-serif; font-weight:700; font-size:1rem;
    cursor:pointer; letter-spacing:0.04em; transition:all 0.2s;
  }
  .submit-btn:hover { opacity:0.87; transform:translateY(-1px); }

  .divider { display:flex; align-items:center; gap:1rem; margin:1.5rem 0; }
  .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
  .divider span { color:var(--muted); font-size:0.8rem; }

  .oauth-btn {
    width:100%; background:transparent; border:1px solid var(--border); color:var(--text);
    padding:0.8rem; border-radius:10px; font-family:'DM Sans',sans-serif; font-size:0.9rem;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:0.6rem;
    transition:border-color 0.2s;
  }
  .oauth-btn:hover { border-color:rgba(255,255,255,0.2); }

  .signup-form { display:none; }
  .signup-form.active, .login-form.active { display:block; }

  .strength-bar { display:flex; gap:4px; margin-top:0.5rem; }
  .strength-seg { height:3px; flex:1; border-radius:2px; background:var(--border); transition:background 0.3s; }

  .pw-hint { font-size:0.75rem; color:var(--muted); margin-top:0.4rem; }

  body.light {
    --bg: #f4f6fa; --bg2: #eaecf2; --bg3: #e0e3ec; --card: #ffffff;
    --text: #0f1218; --muted: #6b7280; --border: rgba(0,0,0,0.09);
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">PDAS <span class="nav-subtitle">Phishing Detection &amp; Awareness System</span></a>
  <div style="display:flex;align-items:center;gap:0.75rem;"><button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="Toggle theme">🌙</button></div>
</nav>

<div class="page-wrap">
  <div class="grid-bg"></div>
  <div class="bg-glow"></div>
  <div class="auth-box">
    <div class="auth-logo">PDAS</div>
    <div class="auth-tagline">Phishing Detection & Awareness System</div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="login-form active" id="loginForm">
      <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <input type="email" placeholder="you@example.com" id="loginEmail">
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" placeholder="••••••••" id="loginPw">
      </div>
      <div class="forgot"><a href="#" onclick="forgotPassword()">Forgot password?</a></div>
      <div id="loginError" style="color:#ef4444;font-size:0.82rem;margin-bottom:0.8rem;display:none;"></div>
      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">Sign In →</button>
      
    </div>

    <!-- SIGNUP FORM -->
    <div class="signup-form" id="signupForm">
      <div class="form-group">
        <label>FULL NAME</label>
        <input type="text" placeholder="Your full name" id="signupName">
      </div>
      <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <input type="email" placeholder="you@example.com" id="signupEmail">
      </div>
      <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" placeholder="••••••••" id="signupPw" oninput="checkStrength(this.value)">
        <div class="strength-bar">
          <div class="strength-seg" id="s1"></div>
          <div class="strength-seg" id="s2"></div>
          <div class="strength-seg" id="s3"></div>
          <div class="strength-seg" id="s4"></div>
        </div>
        <div class="pw-hint" id="pwHint">Use 8+ characters with letters, numbers & symbols</div>
      </div>
      <div class="form-group">
        <label>CONFIRM PASSWORD</label>
        <input type="password" placeholder="••••••••" id="signupConfirm">
      </div>
      <div id="signupError" style="color:#ef4444;font-size:0.82rem;margin-bottom:0.8rem;display:none;"></div>
      <div id="signupSuccess" style="color:#22c55e;font-size:0.82rem;margin-bottom:0.8rem;display:none;"></div>
      <button class="submit-btn" id="signupBtn" onclick="handleSignup()">Create Account →</button>
      
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── Supabase ──
const SUPABASE_URL = 'https://tzujckucxxmbxkpfkngn.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_bmXeOrQV8w0DIkslpprzHg_SpmVydR1';
const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

_supabase.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'dashboard.html';
});

// ── Tab switching ──
function switchTab(tab) {
  document.getElementById('loginForm').classList.toggle('active', tab === 'login');
  document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
}

// ── Password strength ──
function checkStrength(pw) {
  const segs = [document.getElementById('s1'),document.getElementById('s2'),document.getElementById('s3'),document.getElementById('s4')];
  const hint = document.getElementById('pwHint');
  let score = 0;
  if (pw.length >= 8) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#ef4444','#f59e0b','#22c55e','#00e5ff'];
  const labels = ['Weak','Fair','Good','Strong'];
  segs.forEach((s,i) => { s.style.background = i < score ? colors[score-1] : 'rgba(255,255,255,0.07)'; });
  if (score > 0) hint.textContent = labels[score-1] + ' password';
}

// ── Auth ──
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.style.display = 'none';
  if (!email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return; }
  btn.textContent = 'Signing in...'; btn.disabled = true;
  const { error } = await _supabase.auth.signInWithPassword({ email, password });
  if (error) {
    errEl.textContent = error.message; errEl.style.display = 'block';
    btn.textContent = 'Sign In →'; btn.disabled = false;
  } else {
    window.location.href = 'dashboard.html';
  }
}

async function handleSignup() {
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPw').value;
  const confirm = document.getElementById('signupConfirm').value;
  const errEl = document.getElementById('signupError');
  const sucEl = document.getElementById('signupSuccess');
  const btn = document.getElementById('signupBtn');
  errEl.style.display = 'none'; sucEl.style.display = 'none';
  if (!name || !email || !password) { errEl.textContent = 'Please fill in all fields.'; errEl.style.display = 'block'; return; }
  if (password !== confirm) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'block'; return; }
  if (password.length < 8) { errEl.textContent = 'Password must be at least 8 characters.'; errEl.style.display = 'block'; return; }
  btn.textContent = 'Creating account...'; btn.disabled = true;
  const { error } = await _supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
  if (error) {
    errEl.textContent = error.message; errEl.style.display = 'block';
    btn.textContent = 'Create Account →'; btn.disabled = false;
  } else {
    sucEl.textContent = '✓ Account created! Check your email to confirm, then sign in.';
    sucEl.style.display = 'block';
    btn.textContent = 'Create Account →'; btn.disabled = false;
    setTimeout(() => switchTab('login'), 2000);
  }
}

async function forgotPassword() {
  const email = document.getElementById('loginEmail').value.trim();
  const errEl = document.getElementById('loginError');
  if (!email) { errEl.textContent = 'Enter your email above first.'; errEl.style.display = 'block'; return; }
  const { error } = await _supabase.auth.resetPasswordForEmail(email);
  errEl.style.color = error ? '#ef4444' : '#22c55e';
  errEl.textContent = error ? error.message : '✓ Password reset email sent!';
  errEl.style.display = 'block';
}

// ── Theme ──
function toggleTheme() {
  const isDark = !document.body.classList.contains('light');
  document.body.classList.toggle('light', isDark);
  document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('pdas-theme', isDark ? 'light' : 'dark');
}
(function() {
  if (localStorage.getItem('pdas-theme') === 'light') {
    document.body.classList.add('light');
    document.addEventListener('DOMContentLoaded', function() {
      const btn = document.getElementById('themeBtn');
      if (btn) btn.textContent = '☀️';
    });
  }
})();
</script>
</body>
</html>
